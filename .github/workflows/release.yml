name: Release to PyPI

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  validate:
    name: "Validate: release checks"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      type: ${{ steps.release.outputs.type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine release type
        id: release
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          if echo "$TAG_VERSION" | grep -q "dev"; then
            echo "type=dev" >> "$GITHUB_OUTPUT"
            echo "branch=develop" >> "$GITHUB_OUTPUT"
          else
            echo "type=stable" >> "$GITHUB_OUTPUT"
            echo "branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag is on correct branch
        run: |
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref }})
          EXPECTED_BRANCH="${{ steps.release.outputs.branch }}"
          if ! git branch -r --contains "$TAG_COMMIT" | grep -q "origin/$EXPECTED_BRANCH"; then
            echo "ERROR: Tag v${{ steps.release.outputs.version }} must be on $EXPECTED_BRANCH branch"
            echo "  - Dev releases (v*dev*) → develop branch"
            echo "  - Stable releases (v*) → main branch"
            exit 1
          fi

      - name: Verify tag matches pyproject.toml
        run: |
          TAG_VERSION="${{ steps.release.outputs.version }}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag v$TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Verify version in CHANGELOG
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          grep -q "$PKG_VERSION" CHANGELOG.md || (echo "ERROR: version $PKG_VERSION not in CHANGELOG.md" && exit 1)

  test:
    name: "Test: pytest (py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --tb=short -q \
            --junitxml=reports/junit-py${{ matrix.python-version }}.xml \
            --cov --cov-report=html:reports/coverage-html-py${{ matrix.python-version }} \
            --cov-report=term

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-reports-py${{ matrix.python-version }}
          path: reports/
          retention-days: 30

  publish:
    name: "Publish: build and upload to PyPI"
    runs-on: ubuntu-latest
    needs: [validate, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
