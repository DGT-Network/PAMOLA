name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint: ruff"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (errors only, no warnings)
        run: ruff check pamola_core/ --select E9,F63,F7,F82 --no-fix

      - name: Ruff check (full, non-blocking)
        run: ruff check pamola_core/ --statistics || true

  test:
    name: "Test: pytest (py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Full matrix (3.10/3.11/3.12) on all branches (temporary)
        # TODO: revert to single version (3.11) on develop after validation
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          python -m pytest tests/ --tb=short -q \
            --junitxml=reports/junit.xml \
            --cov --cov-report=html:reports/coverage-html \
            --cov-report=term

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-py${{ matrix.python-version }}
          path: reports/
          retention-days: 30

  build:
    name: "Build: sdist + wheel"
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Only build on main branch or PRs to main
    if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify version consistency
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          WHL=$(ls dist/*.whl)
          echo "pyproject.toml version: $PKG_VERSION"
          echo "Built wheel: $WHL"
          echo "$WHL" | grep -q "$PKG_VERSION" || (echo "ERROR: wheel version mismatch" && exit 1)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
